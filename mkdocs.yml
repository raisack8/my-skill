site_name: My skill
site_description: My skill
site_author: raisack
# TODO: 追々公開する必要？
site_url: http://raisack8.github.io/my-skill
repo_name: raisack8/my-skill
repo_url: https://github.com/raisack8/my-skill
copyright: Copyright &copy 2024 raisack

theme:
  name: material
  palette:
    # ライトモード
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: ダークモードに切り替え
    # ダークモード
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: ライトモードに切り替え

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true
  - meta

nav:
  - ホーム: about.md
  # 各々のmdを作る必要がある
  - Python: 
    - FastAPI: py-fastapi-01.md
    - Django: index.md
    - pytest: index.md
    - subprocess: index.md
    - pathlib: index.md
    - mkdocs: index.md
  - React:
    - Hooks: index.md
  - bat:
    - Hooks: index.md
  - PostgreSQL:
    - Hooks: index.md
  - AWS:
    - Hooks: index.md
  - GCP:
    - Hooks: index.md
  - Stable Diffusion:
    - prompt: index.md
  - ハック:
    - prompt: index.md